<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CopilotKit Chat App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">
    <header class="bg-blue-600 text-white p-4 shadow-md">
        <div class="container mx-auto">
            <h1 class="text-2xl font-bold">CopilotKit Chat App</h1>
        </div>
    </header>

    <main class="flex-grow container mx-auto p-4">
        <div id="chat-container" class="bg-white rounded-lg shadow-md p-4 mb-4 max-w-3xl mx-auto">
            <div id="messages" class="h-96 overflow-y-auto mb-4"></div>
            <div class="flex">
                <input type="text" id="message-input" placeholder="Type your message here..." class="flex-grow border rounded-l-lg p-2 focus:outline-none">
                <button id="send-button" class="bg-blue-600 text-white px-4 py-2 rounded-r-lg hover:bg-blue-700">Send</button>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-4 text-center">
        <p>CopilotKit Chat App &copy; 2025</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messagesDiv = document.getElementById('messages');
            const messageInput = document.getElementById('message-input');
            const sendButton = document.getElementById('send-button');

            // Add a welcome message
            addMessage('AI Assistant', 'Hello! How can I help you today?');

            function addMessage(sender, text) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `mb-2 p-2 rounded-lg ${sender === 'You' ? 'bg-blue-100 text-right' : 'bg-gray-100'}`;
                messageDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
                messagesDiv.appendChild(messageDiv);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            async function sendMessage() {
                const message = messageInput.value.trim();
                if (!message) return;

                // Add user message
                addMessage('You', message);
                messageInput.value = '';

                try {
                    // Send to backend
                    const response = await fetch('/copilotkit/chat', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: 'user', content: message }
                            ]
                        })
                    });

                    if (response.ok) {
                        const data = await response.json();
                        addMessage('AI Assistant', data.response);
                    } else {
                        addMessage('AI Assistant', 'Sorry, I encountered an error.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    addMessage('AI Assistant', 'Sorry, I encountered an error.');
                }
            }

            sendButton.addEventListener('click', sendMessage);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
